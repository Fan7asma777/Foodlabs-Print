name: Build & Release

# Builda el binario Windows del FoodLabs Print Agent.
# - Push a main: build + smoke test + artifact (descargable desde Actions, 30 días)
# - Tag print-agent-v*: además crea GitHub Release público con el .exe como asset
# - Manual desde la UI de Actions

on:
  push:
    branches: [main]
    tags:
      - 'print-agent-v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write # crear Release con softprops/action-gh-release

jobs:
  build:
    name: Build Windows .exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          # Sin cache-dependency-path: el primer build no tiene go.sum aún;
          # actions/setup-go falla si lo apuntamos a un archivo inexistente.
          cache: false

      - name: Resolve dependencies
        run: |
          go mod tidy
          cat go.sum || echo "go.sum no generado"

      - name: Install NSIS + ImageMagick (pre-build, necesitamos ICO ANTES de go build)
        run: |
          choco install nsis -y --no-progress
          choco install imagemagick -y --no-progress

      - name: Generate ICO from logo PNG
        run: |
          # NSIS y Windows necesitan .ico (no PNG). ImageMagick genera un
          # .ico multi-resolución con todas las sizes Windows: 16,32,48,256.
          magick cmd/agent/assets/foodlabs-logo.png `
            -background none `
            -define icon:auto-resize=16,32,48,256 `
            installer/foodlabs-logo.ico
          # Copia para que goversioninfo lo encuentre desde cmd/agent/
          Copy-Item installer/foodlabs-logo.ico cmd/agent/foodlabs-logo.ico
          Write-Host "ICO creado: $((Get-Item installer/foodlabs-logo.ico).Length) bytes"

      - name: Generate .syso (icon embed para el .exe)
        run: |
          # goversioninfo lee versioninfo.json y genera resource.syso que Go
          # auto-incluye en el build → el .exe queda con el icono Foodlabs
          # visible en el explorador, alt-tab, taskbar, propiedades, etc.
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
          cd cmd/agent
          goversioninfo -platform-specific=true
          if (-not (Test-Path "resource_windows_amd64.syso")) {
            Write-Error "goversioninfo no genero el .syso"
            exit 1
          }
          Write-Host "syso creado"

      - name: Build binary
        run: |
          # -H=windowsgui: compila como GUI subsystem -> NO abre ventana CMD
          # al arrancar. El proceso vive como background app con solo el tray
          # icon visible. Sin esto, cerrar la ventana CMD mata el proceso.
          # Logs siguen yendo al file (%APPDATA%\FoodLabsPrintAgent\logs\)
          # via io.MultiWriter; stdout queda sin handle pero no rompe.
          go build -ldflags="-s -w -H=windowsgui -X main.version=${{ github.ref_name }}" -o FoodLabsPrintAgent.exe ./cmd/agent

      - name: Smoke test binary
        run: |
          # Tray icon abre una bg thread y systray.Run bloquea. Lo dejamos
          # arrancar 2s y luego killamos: si arrancó sin crash, asumimos ok.
          # Validación más profunda requiere VM con desktop interactivo.
          $process = Start-Process -FilePath ".\FoodLabsPrintAgent.exe" -PassThru -NoNewWindow
          Start-Sleep -Seconds 2
          if (-not $process.HasExited) {
            Stop-Process -Id $process.Id -Force
            Write-Host "Agent started without crashing"
          } else {
            Write-Error "Agent exited immediately (exit code $($process.ExitCode))"
            exit 1
          }

      - name: Build NSIS installer
        run: |
          # NSIS + ImageMagick + ICO ya estaban instalados/generados antes
          # del go build (necesario para el .syso del icono embebido).
          Copy-Item FoodLabsPrintAgent.exe installer\FoodLabsPrintAgent.exe
          cd installer
          & "C:\Program Files (x86)\NSIS\makensis.exe" foodlabs-print.nsi
          if (-not (Test-Path "FoodLabsPrintAgent-Setup.exe")) {
            Write-Error "NSIS no genero el Setup.exe"
            exit 1
          }
          Write-Host "Installer creado: $((Get-Item FoodLabsPrintAgent-Setup.exe).Length) bytes"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FoodLabsPrintAgent-windows-amd64
          path: |
            FoodLabsPrintAgent.exe
            installer/FoodLabsPrintAgent-Setup.exe
          retention-days: 30

      - name: Create release on tag
        if: startsWith(github.ref, 'refs/tags/print-agent-v')
        uses: softprops/action-gh-release@v2
        with:
          name: FoodLabs Print Agent ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: |
            FoodLabsPrintAgent.exe
            installer/FoodLabsPrintAgent-Setup.exe
          body: |
            **FoodLabs Print Agent** — agent local que conecta `foodlabs.app`
            con tu impresora térmica de cocina o boletas.

            ## Instalación

            1. Descargá `FoodLabsPrintAgent.exe` de abajo.
            2. Hacé doble click. Windows va a preguntar si confiás —
               click en **Más información → Ejecutar de todos modos**
               (somos nosotros, no está firmado todavía en esta versión).
            3. Te aparece una ventana negra (consola) confirmando que el
               agent está corriendo en `127.0.0.1:40213`. Dejala abierta.
            4. Volvé a foodlabs.app → Configuración → Impresoras y tocá
               **Volver a escanear**. Tu impresora aparece en la lista.

            ## Features v0.1

            - ✅ Lista impresoras Windows instaladas (locales + red)
            - ✅ Imprime tickets con corte automático del papel
            - ✅ Beep cocina opcional (alerta auditiva al cocinero)
            - ✅ API drop-in compatible con Parzibyte

            ## Próximas versiones
            - v0.2: tray icon en la barra de tareas
            - v0.3: auto-start con Windows
            - v0.4: auto-update silencioso
            - v1.0: code-signed (sin warning de "publisher desconocido")
